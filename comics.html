<!DOCTYPE html>
<html>
<head>
    <title>Simple Comic</title>
    <style>
        .comic {
            display: flex;
            gap: 10px;
        }

        .panel {
            width: 200px;
            height: 200px;
            border: 2px solid black;
            padding: 10px;
            background: #f5f5f5;
        }

        .speech {
            background: white;
            border: 1px solid black;
            padding: 5px;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>My Comic</h1>

<div class="comic">
    <div class="panel">
        😀
        <div class="speech">Hello!</div>
    </div>

    <div class="panel">
        😎
        <div class="speech">Hi there!</div>
    </div>


</div>

</body>
</html>
